<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NeuralChat — AI Assistant</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!-- Distinctive font pairing: Syne (display) + DM Mono (code feel body) -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
</head>
<body>

  <!-- ───────────────────────── SIDEBAR ───────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">NeuralChat</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar">
        <span></span><span></span><span></span>
      </button>
    </div>

    <!-- User Identity Panel -->
    <div class="user-panel" id="userPanel">
      <div class="user-avatar" id="userAvatar">?</div>
      <div class="user-info">
        <span class="user-name" id="displayName">Guest</span>
        <span class="user-status">● Online</span>
      </div>
    </div>

    <!-- Login Form (shown before username set) -->
    <div class="login-section" id="loginSection">
      <p class="login-label">Enter your name to begin</p>
      <div class="login-form">
        <input type="text" id="usernameInput" placeholder="Your name..." maxlength="30" autocomplete="off" />
        <button id="loginBtn" class="btn-primary">Start →</button>
      </div>
    </div>

    <!-- Sidebar Actions -->
    <nav class="sidebar-nav" id="sidebarNav" style="display:none">
      <button class="nav-btn" id="newChatBtn">
        <span class="nav-icon">✦</span> New Chat
      </button>
      <button class="nav-btn" id="downloadBtn">
        <span class="nav-icon">↓</span> Download Chat
      </button>
      <button class="nav-btn danger" id="clearBtn">
        <span class="nav-icon">⊗</span> Clear History
      </button>
    </nav>

    <!-- Sidebar Footer -->
    <div class="sidebar-footer">
      <div class="theme-toggle-wrap">
        <span class="theme-label">Dark</span>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme">
          <span class="toggle-knob"></span>
        </button>
        <span class="theme-label">Light</span>
      </div>
      <p class="footer-note">Powered by Google Gemini</p>
    </div>
  </aside>

  <!-- ───────────────────────── MAIN CHAT AREA ───────────────────────── -->
  <main class="chat-container" id="chatContainer">

    <!-- Top Bar -->
    <header class="chat-header">
      <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
      <div class="header-info">
        <div class="ai-indicator">
          <span class="pulse-dot"></span>
          <span>AI Assistant</span>
        </div>
        <span class="header-subtitle">Coding &amp; Study Helper</span>
      </div>
      <div class="header-actions">
        <span class="msg-count" id="msgCount">0 messages</span>
      </div>
    </header>

    <!-- Messages Area -->
    <section class="messages-area" id="messagesArea">

      <!-- Welcome screen (shown when no messages) -->
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">⬡</div>
        <h1 class="welcome-title">NeuralChat</h1>
        <p class="welcome-subtitle">Your intelligent coding & study companion</p>
        <div class="suggestion-grid">
          <button class="suggestion-chip" data-msg="Explain how async/await works in JavaScript">
            Explain async/await in JS
          </button>
          <button class="suggestion-chip" data-msg="Help me understand Big O notation">
            Big O Notation basics
          </button>
          <button class="suggestion-chip" data-msg="What's the difference between SQL and NoSQL databases?">
            SQL vs NoSQL
          </button>
          <button class="suggestion-chip" data-msg="Write a Python function to reverse a string">
            Python: reverse a string
          </button>
        </div>
      </div>

      <!-- Chat messages are injected here by JS -->
      <div class="messages-list" id="messagesList"></div>

    </section>

    <!-- Input Area -->
    <footer class="input-area">
      <div class="input-wrapper">
        <button class="voice-btn" id="voiceBtn" title="Voice input">🎤</button>
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="Ask me anything about code or studies..."
          rows="1"
          maxlength="2000"
        ></textarea>
        <div class="input-actions">
          <span class="char-counter" id="charCounter">0 / 2000</span>
          <button class="send-btn" id="sendBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
      <p class="input-disclaimer">NeuralChat can make mistakes. Verify important information.</p>
    </footer>

  </main>

  <!-- ───────────────────────── TOAST NOTIFICATION ───────────────────────── -->
  <div class="toast" id="toast"></div>

  <!-- Highlight.js for code syntax highlighting -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
